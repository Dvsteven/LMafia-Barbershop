<script>
  // Convierte cada token de color en una función que lee variables CSS,
  // así los mismos nombres de clase (bg-card, text-muted, bg-accent/40, etc.)
  // cambian solos según el atributo data-theme, sin tocar el resto del archivo.
  function themedColor(variable) {
    return ({ opacityValue }) => opacityValue === undefined
      ? `rgb(var(${variable}))`
      : `rgb(var(${variable}) / ${opacityValue})`;
  }

  tailwind.config = {
    theme: {
      extend: {
        colors: {
          base: themedColor('--color-base'),
          card: themedColor('--color-card'),
          card2: themedColor('--color-card2'),
          edge: themedColor('--color-edge'),
          accent: themedColor('--color-accent'),
          accent2: themedColor('--color-accent2'),
          ember: themedColor('--color-ember'),
          muted: themedColor('--color-muted'),
          okgreen: themedColor('--color-okgreen'),
          // "white" se usa en todo el archivo como color de texto principal;
          // se redefine para que también responda al tema claro/oscuro.
          white: themedColor('--color-text'),
        },
        fontFamily: {
          display: ['"Bebas Neue"', 'sans-serif'],
          body: ['Inter', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'monospace'],
        },
      }
    }
  }
</script>

<script>
/* ============================================================
   Selector de tema — claro / oscuro / según el sistema
   Independiente del resto de la app: solo toca el atributo
   data-theme del <html> y el ícono del botón.
   ============================================================ */
(function () {
  const THEME_KEY = 'lamafia_theme_pref';
  const ICONS = {
    dark: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>',
    light: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 3v2M12 19v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M3 12h2M19 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>',
    system: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="1.5"/><path d="M8 20h8M12 16v4"/></svg>',
  };
  const LABELS = { dark: 'Oscuro', light: 'Claro', system: 'Según el sistema' };
  const ORDER = ['dark', 'light', 'system'];

  const mql = window.matchMedia('(prefers-color-scheme: dark)');
  let pref = localStorage.getItem(THEME_KEY) || 'dark';

  function isDarkFor(p) {
    return p === 'system' ? mql.matches : p === 'dark';
  }

  function apply(p) {
    document.documentElement.setAttribute('data-theme', isDarkFor(p) ? 'dark' : 'light');
    const btn = document.getElementById('theme-toggle-btn');
    if (btn) {
      btn.innerHTML = ICONS[p];
      btn.setAttribute('aria-label', 'Tema: ' + LABELS[p] + '. Toca para cambiar.');
      btn.title = 'Tema: ' + LABELS[p];
    }
  }

  document.addEventListener('DOMContentLoaded', () => apply(pref));
  // por si este script corre después de que el DOM ya esté listo
  if (document.readyState !== 'loading') apply(pref);

  mql.addEventListener('change', () => { if (pref === 'system') apply(pref); });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('#theme-toggle-btn')) return;
    pref = ORDER[(ORDER.indexOf(pref) + 1) % ORDER.length];
    localStorage.setItem(THEME_KEY, pref);
    apply(pref);
  });
})();
</script>

function nextDates(n) {
  const days = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const out = [];
  const today = new Date();
  for (let i = 0; i < n; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    out.push({
      iso: d.toISOString().slice(0,10),
      label: (i === 0 ? 'Hoy' : days[d.getDay()]),
      day: d.getDate(),
      month: d.toLocaleDateString('es-CO', { month: 'short' }).replace('.',''),
    });
  }
  return out;
}

function getTodayIso() {
  return nextDates(1)[0].iso;
}

function timeToMinutes(t) {
  const [time, ampm] = t.split(' ');
  let [h, m] = time.split(':').map(Number);
  if (ampm === 'PM' && h !== 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  return h * 60 + m;
}

/* --- Disponibilidad de agenda ---
   Reglas:
   - Un barbero puede bloquear franjas sueltas (blockedSlots) o el día completo (restDay, hoy).
   - Un cupo ocupado por una cita confirmada no se muestra más al público.
   - Los miembros tienen cupos extra (MEMBER_RESERVED_SLOTS) fuera de la grilla pública,
     que nunca chocan con las citas del público.
   - Al cancelarse una cita, el cupo queda reservado solo para miembros durante
     CANCEL_PRIORITY_WINDOW_MINUTES antes de reabrirse al público. */

function isSlotBlockedByBarber(barberId, date, time) {
  const b = DB.barbers.find(x => x.id === barberId);
  if (!b) return false;
  if (b.restDay && date === getTodayIso()) return true;
  const blocked = (b.blockedSlots && b.blockedSlots[date]) || [];
  return blocked.includes(time);
}

function activeApptAt(barberId, date, time) {
  return DB.appointments.find(a => a.barberId === barberId && a.date === date && a.time === time && (a.status === 'confirmada' || a.status === 'pendiente'));
}

function lastCancelledAt(barberId, date, time) {
  const list = DB.appointments.filter(a => a.barberId === barberId && a.date === date && a.time === time && a.status === 'cancelada' && a.freedAt);
  if (!list.length) return null;
  return list.sort((a, b) => b.freedAt - a.freedAt)[0];
}

function isInPriorityWindow(barberId, date, time) {
  const c = lastCancelledAt(barberId, date, time);
  if (!c) return false;
  return (Date.now() - c.freedAt) < CANCEL_PRIORITY_WINDOW_MINUTES * 60000;
}

function isSlotAvailableForPublic(barberId, date, time) {
  if (!barberId || !date) return true;
  if (isSlotBlockedByBarber(barberId, date, time)) return false;
  if (activeApptAt(barberId, date, time)) return false;
  if (isInPriorityWindow(barberId, date, time)) return false;
  return true;
}

function isSlotAvailableForMember(barberId, date, time) {
  if (!barberId || !date) return true;
  if (isSlotBlockedByBarber(barberId, date, time)) return false;
  if (activeApptAt(barberId, date, time)) return false;
  return true; // los miembros ignoran la ventana de prioridad: entran de inmediato
}

function isReservedSlotAvailable(barberId, date, time) {
  if (!barberId || !date) return true;
  if (isSlotBlockedByBarber(barberId, date, time)) return false;
  return !activeApptAt(barberId, date, time);
}

function upcomingApptForMember(memberId) {
  const list = DB.appointments.filter(a => a.memberId === memberId && (a.status === 'confirmada' || a.status === 'pendiente'));
  if (!list.length) return null;
  return list.sort((a, b) => a.date === b.date ? timeToMinutes(a.time) - timeToMinutes(b.time) : a.date.localeCompare(b.date))[0];
}

function cancelAppointment(id, canceller) {
  const appt = DB.appointments.find(a => a.id === id);
  if (!appt || appt.status === 'cancelada' || appt.status === 'rechazada') return;
  const wasConfirmed = appt.status === 'confirmada';
  appt.status = 'cancelada';
  appt.cancelledBy = canceller;
  appt.freedAt = Date.now();
  // El crédito solo se descontó si la cita alcanzó a confirmarse; una solicitud
  // "pendiente" que se cancela nunca tocó el saldo del miembro.
  if (wasConfirmed && appt.type === 'miembro' && appt.memberId) {
    const m = DB.members.find(x => x.id === appt.memberId);
    if (m) m.cortesUsados = Math.max(0, m.cortesUsados - 1);
  }
  saveDB(DB);
}

// El barbero acepta o rechaza una solicitud pendiente. El crédito de membresía
// se descuenta recién aquí (al aceptar), nunca al momento de la solicitud —
// así una cita rechazada jamás le cuesta un corte al cliente.
function respondToAppointment(id, decision, reason) {
  const appt = DB.appointments.find(a => a.id === id);
  if (!appt || appt.status !== 'pendiente') return;
  appt.status = decision;
  appt.decidedAt = Date.now();
  if (decision === 'rechazada') {
    appt.rejectReason = reason || '';
  }
  if (decision === 'confirmada' && appt.type === 'miembro' && appt.memberId) {
    const m = DB.members.find(x => x.id === appt.memberId);
    if (m) {
      const p = planOf(m);
      m.cortesUsados = Math.min(p.cortes, m.cortesUsados + 1);
    }
  }
  saveDB(DB);
}

function fmtCountdown(ms) {
  const totalSec = Math.max(0, Math.ceil(ms / 1000));
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

/* ============================ NOTIFICACIONES ============================ */

function showToast(message, tone) {
  const stack = document.getElementById('toast-stack');
  if (!stack) return;
  const toneCls = tone === 'ok' ? 'border-okgreen/50 text-okgreen' : tone === 'warn' ? 'border-ember/50 text-ember' : 'border-accent/50 text-accent';
  const icon = tone === 'ok' ? 'check' : tone === 'warn' ? 'close' : 'bell';
  const el = document.createElement('div');
  el.className = `fade-in pointer-events-auto rounded-xl bg-card2/95 backdrop-blur card-edge border ${toneCls} px-4 py-3 shadow-[0_10px_30px_rgba(0,0,0,0.5)] flex items-start gap-2`;
  el.innerHTML = `<span class="shrink-0 mt-0.5">${svgIcon(icon, 'w-4 h-4')}</span><span class="flex-1 text-xs text-white leading-snug">${message}</span>`;
  el.addEventListener('click', () => dismissToast(el));
  stack.appendChild(el);
  setTimeout(() => dismissToast(el), 5000);
}

function dismissToast(el) {
  if (!el || !el.parentNode) return;
  el.style.transition = 'opacity .2s ease, transform .2s ease';
  el.style.opacity = '0';
  el.style.transform = 'translateY(-6px)';
  setTimeout(() => el.remove(), 200);
}

// Se llama en cada render(). Es idempotente: solo notifica una vez por evento
// gracias a UI.notifiedPendingIds (barbero) y UI.lastNotifiedApptStatus (cliente).
function checkForNotifications() {
  if (UI.main === 'barber') {
    DB.appointments
      .filter(a => a.barberId === UI.selectedBarberId && a.status === 'pendiente')
      .forEach(a => {
        if (!UI.notifiedPendingIds.has(a.id)) {
          UI.notifiedPendingIds.add(a.id);
          showToast(`<strong>Nueva cita agendada</strong><br/>${a.clientName} · ${formatDateLabel(a.date)} ${a.time}`, 'info');
        }
      });
  }

  if (UI.main === 'client' && UI.lastConfirmedApptId) {
    const appt = DB.appointments.find(a => a.id === UI.lastConfirmedApptId);
    if (appt && appt.status !== UI.lastNotifiedApptStatus) {
      if (appt.status === 'confirmada') {
        showToast('¡Tu barbero confirmó la cita! Te esperamos.', 'ok');
      } else if (appt.status === 'rechazada') {
        showToast('Tu cita no pudo confirmarse' + (appt.rejectReason ? ': ' + appt.rejectReason + '.' : '.'), 'warn');
      }
      UI.lastNotifiedApptStatus = appt.status;
    }
  }
}

/* ============================ RENDER ROUTER ============================ */

let _lastRenderedHtml = '';

function render(opts) {
  opts = opts || {};
  checkForNotifications();
  const root = document.getElementById('view-container');
  let html = '';
  if (UI.main === 'client') {
    if (UI.clientMode === 'home') html = renderClientHome();
    else if (UI.clientMode === 'new') html = renderNewClientFlow();
    else if (UI.clientMode === 'member') html = renderMemberFlow();
  } else if (UI.main === 'barber') {
    html = renderBarberDashboard();
  } else if (UI.main === 'manager') {
    html = renderManagerPanel();
  }

  // En refrescos silenciosos (auto-actualización de fondo), si el contenido
  // no cambió realmente, no tocamos el DOM — evita cualquier parpadeo.
  if (opts.skipIfUnchanged && html === _lastRenderedHtml) {
    syncTabStyles();
    return;
  }
  _lastRenderedHtml = html;

  root.innerHTML = html;
  if (!opts.silent) {
    root.classList.remove('fade-in'); void root.offsetWidth; root.classList.add('fade-in');
  }
  syncTabStyles();
}

function syncTabStyles() {
  document.querySelectorAll('.dev-tab').forEach(btn => {
    const active = btn.dataset.view === UI.main;
    btn.classList.toggle('text-accent', active);
    btn.classList.toggle('text-muted', !active);
  });
}

          <button data-action="accept-appt" data-id="${a.id}" class="flex-1 rounded-lg bg-okgreen/15 border border-okgreen/50 text-okgreen text-xs font-bold uppercase tracking-wide py-2">Aceptar</button>
          <button data-action="start-reject" data-id="${a.id}" class="flex-1 rounded-lg bg-ember/10 border border-ember/50 text-ember text-xs font-bold uppercase tracking-wide py-2">Rechazar</button>
        </div>
      ` : `
        <div class="mt-3 pt-3 border-t border-edge">
          <div class="text-[10px] uppercase tracking-[0.2em] text-muted mb-2">Motivo del rechazo</div>
          <div class="flex flex-wrap gap-1.5">
            ${REJECT_REASONS.map(r => `
              <button data-action="set-reject-reason" data-id="${a.id}" data-reason="${r}" class="text-[10px] font-semibold rounded-full px-2.5 py-1.5 border transition-colors ${UI.rejectDraft.reason===r ? 'bg-ember text-white border-ember' : 'bg-card2 text-muted border-edge hover:border-ember/60'}">${r}</button>
            `).join('')}
          </div>
          ${UI.rejectDraft.reason === 'Otro motivo' ? `
            <input id="input-reject-custom" type="text" placeholder="Escribe el motivo..." class="w-full rounded-lg px-3 py-2 mt-2 text-xs" />
          ` : ''}
          <div class="flex gap-2 mt-3">
            <button data-action="cancel-reject" class="flex-1 rounded-lg bg-card2 card-edge text-muted text-[11px] font-bold uppercase tracking-wide py-2">Cancelar</button>
            <button data-action="confirm-reject" data-id="${a.id}" class="flex-1 rounded-lg bg-ember text-white text-[11px] font-bold uppercase tracking-wide py-2 ${!UI.rejectDraft.reason ? 'opacity-40 pointer-events-none' : ''}">Confirmar rechazo</button>
          </div>
        </div>
      `}
    </div>
  `;
}

/* ============================ VIEW: MANAGER PANEL ============================ */

function renderRecentCancellations() {
  const recent = DB.appointments
    .filter(a => a.status === 'cancelada' && a.freedAt)
    .sort((a,b) => b.freedAt - a.freedAt)
    .slice(0, 5);

  if (!recent.length) return '';

  return `
  <div class="mt-6">
    <div class="text-[11px] uppercase tracking-[0.2em] text-muted mb-3">Cancelaciones recientes</div>
    <div class="space-y-2">
      ${recent.map(a => {
        const remaining = CANCEL_PRIORITY_WINDOW_MINUTES * 60000 - (Date.now() - a.freedAt);
        const barberName = DB.barbers.find(b=>b.id===a.barberId)?.name || '—';
        return `
        <div class="rounded-xl bg-card card-edge px-4 py-3 flex items-center justify-between">
          <div>
            <div class="text-xs text-white font-semibold">${formatDateLabel(a.date)} · ${a.time} — ${barberName}</div>
            <div class="text-[10px] text-muted mt-0.5">Cancelada por ${a.cancelledBy === 'cliente' ? 'el cliente' : 'el barbero'}</div>
          </div>
          ${remaining > 0 ? `
            <div class="text-right">
              <div class="text-[9px] uppercase text-accent font-bold tracking-wide">Solo miembros</div>
              <div class="font-mono text-xs text-muted">${fmtCountdown(remaining)}</div>
            </div>
          ` : `
            <div class="text-[9px] uppercase text-okgreen font-bold tracking-wide">Abierto al público</div>
          `}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}


function renderPendingRequests() {
  const pending = DB.appointments
    .filter(a => a.status === 'pendiente')
    .sort((a,b) => a.date === b.date ? timeToMinutes(a.time) - timeToMinutes(b.time) : a.date.localeCompare(b.date));
  if (!pending.length) return '';
  return `
  <div class="mt-6">
    <div class="flex items-center gap-1.5 text-[11px] uppercase tracking-[0.2em] text-accent mb-3">
      <span class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse"></span> Solicitudes sin decidir (${pending.length})
    </div>
    <div class="space-y-2">
      ${pending.map(a => `
        <div class="rounded-xl bg-card border border-accent/40 px-4 py-3 flex items-center justify-between">
          <div>
            <div class="text-xs text-white font-semibold">${formatDateLabel(a.date)} · ${a.time} — ${DB.barbers.find(b=>b.id===a.barberId)?.name || '—'}</div>
            <div class="text-[10px] text-muted mt-0.5">${a.clientName} · ${a.serviceName}</div>
          </div>
          <div class="text-[9px] uppercase text-accent font-bold tracking-wide shrink-0 ml-2">Esperando</div>
        </div>
      `).join('')}
    </div>
  </div>`;
}

function renderManagerPanel() {
  const ingresosProyectados = DB.members.reduce((sum, m) => sum + planOf(m).price, 0);
  const planCounts = {};
  DB.members.forEach(m => { const key = m.category + '|' + m.tier; planCounts[key] = (planCounts[key] || 0) + 1; });
  const topPlanKey = Object.entries(planCounts).sort((a,b) => b[1]-a[1])[0];
  const [topCategory, topTier] = topPlanKey[0].split('|');
  const topPlanCount = topPlanKey[1];
  const totalAfiliados = DB.members.length;

  return `
  <div class="px-5 pt-6">
    <div class="font-display text-3xl text-white leading-none">PANEL <span class="text-accent">GERENCIA</span></div>
    <div class="text-[11px] uppercase tracking-[0.2em] text-muted mt-1">La Mafia · Pereira</div>

    <div class="grid grid-cols-1 gap-3 mt-5">
      <div class="rounded-xl bg-card card-edge px-4 py-4">
        <div class="flex items-center gap-1.5 text-muted text-[10px] uppercase tracking-wide">${svgIcon('trend','w-3.5 h-3.5')} Ingresos proyectados por membresías</div>
        <div class="font-mono text-3xl font-bold text-accent mt-1">${money(ingresosProyectados)}<span class="text-sm text-muted">/mes</span></div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="rounded-xl bg-card card-edge px-4 py-4">
          <div class="flex items-center gap-1.5 text-muted text-[10px] uppercase tracking-wide">${svgIcon('star','w-3.5 h-3.5')} Plan más vendido</div>
          <div class="font-display text-2xl text-white mt-1" style="color:${categoryMeta(topCategory).color}">${categoryMeta(topCategory).label.toUpperCase()} ${PLANS[topCategory][topTier].label.toUpperCase()}</div>
          <div class="text-[11px] text-muted mt-0.5">${topPlanCount} afiliados</div>
        </div>
        <div class="rounded-xl bg-card card-edge px-4 py-4">
          <div class="flex items-center gap-1.5 text-muted text-[10px] uppercase tracking-wide">${svgIcon('users','w-3.5 h-3.5')} Afiliados activos</div>
          <div class="font-mono text-2xl font-bold text-white mt-1">${totalAfiliados}</div>
        </div>
      </div>
    </div>

    ${renderPendingRequests()}

    <div class="mt-6 text-[11px] uppercase tracking-[0.2em] text-muted">Control de créditos por afiliado</div>
    <div class="mt-3 space-y-2.5">
      ${DB.members.map(m => {
        const meta = categoryMeta(m.category);
        const plan = planOf(m);
        const cortesLeft = plan.cortes - m.cortesUsados;
        return `
        <div class="rounded-xl bg-card card-edge px-4 py-3.5">
          <div class="flex items-center justify-between">
            <div>
              <div class="text-sm font-semibold text-white">${m.name}</div>
              <div class="text-[11px] text-muted mt-0.5">${m.phone} · ${meta.icon} ${meta.label} ${plan.label}</div>
            </div>
            <div class="text-right">
              <div class="font-mono text-sm font-bold ${cortesLeft <= 0 ? 'text-ember' : 'text-accent'}">${cortesLeft}/${plan.cortes}</div>
              <div class="text-[10px] text-muted">créditos rest.</div>
            </div>
          </div>
          <div class="flex gap-1.5 mt-2.5">
            ${Array.from({length: plan.cortes}).map((_,i) => `<div class="punch-dot ${i < m.cortesUsados ? 'filled' : 'empty'}" style="width:12px;height:12px; ${i < m.cortesUsados ? `background:${meta.color};` : ''} border-color:${meta.color};"></div>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>

    ${renderRecentCancellations()}

    <div class="mt-6 rounded-xl border border-edge bg-card2/60 px-4 py-3 text-[11px] text-muted flex items-start gap-2">
      ${svgIcon('check', 'shrink-0 mt-0.5 text-okgreen')}
      <span>El sistema descuenta créditos automáticamente en cada cita, evitando cortes no registrados o pérdidas por control manual.</span>
    </div>
  </div>`;
}

/* ============================ EVENT HANDLING ============================ */

document.addEventListener('click', (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;

  switch (action) {
    case 'switch-main':
      UI.main = target.dataset.view;
      if (UI.main === 'client') { UI.clientMode = 'home'; }
      if (UI.main === 'barber') { seedNotifiedForBarber(UI.selectedBarberId); }
      render();
      break;

    case 'go-client-home':
      UI.clientMode = 'home';
      UI.newStep = 1;
      UI.newSel = { service: null, barberId: null, date: null, time: null, name: '', phone: '' };
      UI.memberId = null;
      UI.memberStep = 1;
      UI.memberSel = { barberId: null, date: null, time: null };
      UI.lastConfirmedCode = null;
      UI.lastConfirmedApptId = null;
      UI.lastNotifiedApptStatus = null;
      render();
      break;

    case 'go-new-client':
      UI.clientMode = 'new';
      UI.newStep = 1;
      render();
      break;

    case 'go-member':
      UI.clientMode = 'member';
      UI.memberId = null;
      UI.memberStep = 1;
      render();
      break;

    case 'pick-service':
      UI.newSel.service = target.dataset.id;
      UI.newStep = 2;
      render();
      break;

    case 'pick-barber': {
      const key = target.dataset.sel;
      UI[key].barberId = target.dataset.id;
      UI[key].date = null;
      UI[key].time = null;
      UI[key].reserved = false;
      if (key === 'newSel') UI.newStep = 3;
      if (key === 'memberSel') UI.memberStep = 2;
      render();
      break;
    }

    case 'pick-date': {
      const key = target.dataset.sel;
      UI[key].date = target.dataset.date;
      UI[key].time = null;
      UI[key].reserved = false;
      render();
      break;
    }

    case 'pick-time': {
      const key = target.dataset.sel;
      UI[key].time = target.dataset.time;
      UI[key].reserved = target.dataset.reserved === '1';
      render();
      break;
    }

    case 'to-step-4':
      UI.newStep = 4;
      render();
      break;

    case 'confirm-new-client': {
      const nameEl = document.getElementById('input-name');
      const phoneEl = document.getElementById('input-phone');
      UI.newSel.name = nameEl ? nameEl.value.trim() : '';
      UI.newSel.phone = phoneEl ? phoneEl.value.trim() : '';
      if (!UI.newSel.name) { nameEl.focus(); return; }

      UI.confirming = true;
      render();
      setTimeout(() => {
        const svc = SERVICES.find(s => s.id === UI.newSel.service);
        const appt = {
          id: DB.nextApptId++,
          clientName: UI.newSel.name || 'Cliente',
          type: 'nuevo',
          serviceName: svc ? svc.name : '',
          barberId: UI.newSel.barberId,
          date: UI.newSel.date,
          time: UI.newSel.time,
          status: 'pendiente',
        };
        DB.appointments.push(appt);
        saveDB(DB);
        UI.confirming = false;
        UI.lastConfirmedCode = 'LM-' + String(appt.id).padStart(4, '0');
        UI.lastConfirmedApptId = appt.id;
        UI.lastNotifiedApptStatus = 'pendiente';
        render();
      }, 1100);
      break;
    }

    case 'pick-member':
      UI.memberId = target.dataset.id;
      UI.memberStep = 1;
      render();
      break;

    case 'member-confirm': {
      UI.confirming = true;
      render();
      setTimeout(() => {
        const member = DB.members.find(m => m.id === UI.memberId);
        const plan = planOf(member);
        const appt = {
          id: DB.nextApptId++,
          clientName: member.name,
          type: 'miembro',
          memberId: member.id,
          reserved: UI.memberSel.reserved,
          serviceName: 'Corte (Plan ' + categoryMeta(member.category).label + ' ' + plan.label + ')',
          barberId: UI.memberSel.barberId,
          date: UI.memberSel.date,
          time: UI.memberSel.time,
          status: 'pendiente',
        };
        DB.appointments.push(appt);
        saveDB(DB);
        UI.confirming = false;
        UI.lastConfirmedCode = 'LM-' + String(appt.id).padStart(4, '0');
        UI.lastConfirmedApptId = appt.id;
        UI.lastNotifiedApptStatus = 'pendiente';
        render();
      }, 1100);
      break;
    }

    case 'select-barber':
      UI.selectedBarberId = target.dataset.id;
      seedNotifiedForBarber(UI.selectedBarberId);
      render();
      break;

    case 'toggle-rest': {
      const b = DB.barbers.find(b => b.id === target.dataset.id);
      b.restDay = !b.restDay;
      saveDB(DB);
      render();
      break;
    }

    case 'toggle-slot-block': {
      const b = DB.barbers.find(b => b.id === target.dataset.barberId);
      const time = target.dataset.time;
      const date = getTodayIso();
      if (!b.blockedSlots) b.blockedSlots = {};
      if (!b.blockedSlots[date]) b.blockedSlots[date] = [];
      const idx = b.blockedSlots[date].indexOf(time);
      if (idx >= 0) b.blockedSlots[date].splice(idx, 1);
      else b.blockedSlots[date].push(time);
      saveDB(DB);
      render();
      break;
    }

    case 'start-walkin':
      UI.walkInDraft = { time: target.dataset.time, service: null, name: '' };
      render();
      break;

    case 'pick-walkin-service':
      UI.walkInDraft.service = target.dataset.id;
      render();
      break;

    case 'cancel-walkin':
      UI.walkInDraft = { time: null, service: null, name: '' };
      render();
      break;

    case 'confirm-walkin': {
      const nameEl = document.getElementById('input-walkin-name');
      const svc = SERVICES.find(s => s.id === UI.walkInDraft.service);
      const appt = {
        id: DB.nextApptId++,
        clientName: (nameEl && nameEl.value.trim()) || 'Cliente presencial',
        type: 'nuevo',
        walkIn: true,
        serviceName: svc ? svc.name : '',
        barberId: target.dataset.barberId,
        date: target.dataset.date,
        time: UI.walkInDraft.time,
        status: 'confirmada',
      };
      DB.appointments.push(appt);
      saveDB(DB);
      showToast('Cliente presencial agendado a las ' + appt.time + '.', 'ok');
      UI.walkInDraft = { time: null, service: null, name: '' };
      render();
      break;
    }

    case 'request-cancel-appt':
      UI.pendingCancelApptId = Number(target.dataset.id);
      render();
      break;

    case 'cancel-appt-abort':
      UI.pendingCancelApptId = null;
      render();
      break;

    case 'cancel-appt-confirm': {
      const id = Number(target.dataset.id);
      cancelAppointment(id, target.dataset.by);
      UI.pendingCancelApptId = null;
      render();
      break;
    }

    case 'accept-appt': {
      const id = Number(target.dataset.id);
      respondToAppointment(id, 'confirmada');
      render();
      break;
    }

    case 'start-reject':
      UI.rejectDraft = { apptId: Number(target.dataset.id), reason: '' };
      render();
      break;

    case 'cancel-reject':
      UI.rejectDraft = { apptId: null, reason: '' };
      render();
      break;

    case 'set-reject-reason':
      UI.rejectDraft.reason = target.dataset.reason;
      render();
      break;

    case 'confirm-reject': {
      const id = Number(target.dataset.id);
      let reason = UI.rejectDraft.reason;
      if (reason === 'Otro motivo') {
        const custom = document.getElementById('input-reject-custom');
        reason = (custom && custom.value.trim()) || 'Otro motivo';
      }
      respondToAppointment(id, 'rechazada', reason);
      UI.rejectDraft = { apptId: null, reason: '' };
      render();
      break;
    }

    case 'retry-new-client':
      UI.lastConfirmedCode = null;
      UI.lastConfirmedApptId = null;
      UI.newStep = 3;
      UI.newSel.date = null;
      UI.newSel.time = null;
      render();
      break;

    case 'retry-member-booking':
      UI.lastConfirmedCode = null;
      UI.lastConfirmedApptId = null;
      UI.memberStep = 1;
      UI.memberSel = { barberId: null, date: null, time: null, reserved: false };
      render();
      break;
  }
});

render();

// Refresca vistas de barbero/gerencia cada pocos segundos para reflejar
// cupos liberados y cuentas regresivas de la ventana de prioridad de miembros.
// También refresca la pantalla de espera del cliente (tras agendar) para que
// vea en vivo si el barbero ya aceptó o rechazó su solicitud — sin tocar
// ningún formulario en curso, que es lo único que sí queremos evitar interrumpir.
setInterval(() => {
  if (UI.main === 'barber' || UI.main === 'manager') {
    render({ silent: true, skipIfUnchanged: true });
  } else if (UI.main === 'client' && UI.lastConfirmedApptId) {
    render({ silent: true, skipIfUnchanged: true });
  }
}, 5000);
